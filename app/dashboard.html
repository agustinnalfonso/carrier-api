<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Carrier Sales Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #0f1117; color: #e6e6e6; margin: 0; padding: 24px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #9aa0a6; margin-bottom: 24px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: #1a1d27; border: 1px solid #2a2e3a; border-radius: 10px; padding: 16px; }
  .card .label { font-size: 12px; color: #9aa0a6; text-transform: uppercase; letter-spacing: 0.04em; }
  .card .value { font-size: 28px; font-weight: 600; margin-top: 6px; }
  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
  .chart-card { background: #1a1d27; border: 1px solid #2a2e3a; border-radius: 10px; padding: 16px; }
  .chart-card h3 { margin: 0 0 12px 0; font-size: 14px; color: #cfd3da; }
  #apiKeyBar { margin-bottom: 20px; display: flex; gap: 8px; align-items: center; }
  #apiKeyBar input { flex: 1; max-width: 320px; padding: 8px 10px; border-radius: 6px; border: 1px solid #2a2e3a; background: #12141c; color: #e6e6e6; }
  #apiKeyBar button { padding: 8px 14px; border-radius: 6px; border: none; background: #4f7cff; color: white; cursor: pointer; }
  #err { color: #ff6b6b; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
  <h1>Carrier Sales — Call Metrics</h1>
  <div class="sub">Live metrics from the inbound carrier sales agent</div>

  <div id="apiKeyBar">
    <input id="apiKey" type="password" placeholder="X-API-Key" />
    <button onclick="loadMetrics()">Load</button>
  </div>
  <div id="err"></div>

  <div class="grid" id="summaryCards"></div>

  <div class="charts">
    <div class="chart-card"><h3>Outcome Breakdown</h3><canvas id="outcomeChart"></canvas></div>
    <div class="chart-card"><h3>Sentiment Breakdown</h3><canvas id="sentimentChart"></canvas></div>
    <div class="chart-card"><h3>Decline Reasons</h3><canvas id="declineChart"></canvas></div>
    <div class="chart-card"><h3>Rate: Loadboard vs. Final Agreed</h3><canvas id="rateChart"></canvas></div>
  </div>

<script>
let charts = {};

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function renderBarChart(canvasId, labels, data, colors) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId).getContext('2d');
  charts[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: colors }] },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#cfd3da' }, grid: { color: '#2a2e3a' } },
        y: { ticks: { color: '#cfd3da' }, grid: { color: '#2a2e3a' }, beginAtZero: true }
      }
    }
  });
}

function card(label, value) {
  return `<div class="card"><div class="label">${label}</div><div class="value">${value}</div></div>`;
}

async function loadMetrics() {
  const key = document.getElementById('apiKey').value;
  const errEl = document.getElementById('err');
  errEl.textContent = '';

  try {
    const res = await fetch('/metrics', { headers: { 'X-API-Key': key } });
    if (!res.ok) {
      errEl.textContent = `Error ${res.status}: check your API key`;
      return;
    }
    const m = await res.json();

    document.getElementById('summaryCards').innerHTML = [
      card('Total Calls', m.total_calls),
      card('Booking Rate', m.booking_rate_pct + '%'),
      card('Eligibility Rate', m.eligibility_rate_pct + '%'),
      card('Avg. Negotiation Rounds', m.avg_negotiation_rounds ? m.avg_negotiation_rounds.toFixed(1) : '—'),
      card('Avg. Call Duration', m.avg_call_duration_seconds ? Math.round(m.avg_call_duration_seconds) + 's' : '—'),
    ].join('');

    const outcomeLabels = Object.keys(m.outcome_breakdown || {});
    const outcomeData = Object.values(m.outcome_breakdown || {});
    renderBarChart('outcomeChart', outcomeLabels, outcomeData,
      ['#4f7cff','#ff9f43','#ff6b6b','#8e8e93','#a55eea','#26de81','#54a0ff']);

    const sentimentLabels = Object.keys(m.sentiment_breakdown || {});
    const sentimentData = Object.values(m.sentiment_breakdown || {});
    renderBarChart('sentimentChart', sentimentLabels, sentimentData,
      ['#26de81','#8e8e93','#ff6b6b']);

    const declineLabels = Object.keys(m.decline_reasons || {});
    const declineData = Object.values(m.decline_reasons || {});
    renderBarChart('declineChart', declineLabels, declineData,
      ['#ff9f43','#ff6b6b','#a55eea','#54a0ff']);

    destroyChart('rateChart');
    const ctx = document.getElementById('rateChart').getContext('2d');
    charts['rateChart'] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Avg. Loadboard Rate', 'Avg. Final Agreed Rate'],
        datasets: [{
          data: [m.avg_loadboard_rate || 0, m.avg_final_agreed_rate || 0],
          backgroundColor: ['#4f7cff', '#26de81']
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#cfd3da' }, grid: { color: '#2a2e3a' } },
          y: { ticks: { color: '#cfd3da' }, grid: { color: '#2a2e3a' }, beginAtZero: true }
        }
      }
    });

  } catch (e) {
    errEl.textContent = 'Failed to load metrics: ' + e.message;
  }
}
</script>
</body>
</html>
